<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUN Fitness Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* === 既存のスタイル === */
        :root {
            --bg-color: #121212;
            --surface-color: #1E1E1E;
            --primary-color: #BB86FC;
            --primary-variant: #3700B3;
            --secondary-color: #03DAC6;
            --background-on: #FFFFFF;
            --surface-on: #FFFFFF;
            --primary-on: #000000;
            --secondary-on: #000000;
            --error-color: #CF6679;
            --text-primary: rgba(255, 255, 255, 0.87);
            --text-secondary: rgba(255, 255, 255, 0.60);
            --border-color: rgba(255, 255, 255, 0.12);
            --pfc-protein: #4CAF50;
            --pfc-fat: #FFC107;
            --pfc-carbs: #2196F3;
            --tab-bar-height: 60px;
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-bottom: var(--tab-bar-height); /* Bottom Nav space */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* === Components === */
        .card {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            color: var(--primary-color);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 24px;
            margin-bottom: 8px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 4px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1rem;
            box-sizing: border-box;
        }
        
        input[type="number"] {
             -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            padding: 10px 16px;
            border-radius: 4px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.5px;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: var(--primary-on);
        }
        .btn-primary:active { background-color: #a370e0; }

        .btn-secondary {
            background-color: transparent;
            color: var(--secondary-color);
            border: 1px solid var(--secondary-color);
        }
        .btn-secondary:active { background-color: rgba(3, 218, 198, 0.1); }
        
        .btn-text {
            background-color: transparent;
            color: var(--text-secondary);
            padding: 8px;
        }
        .btn-text:active { color: var(--text-primary); }
        
        .btn-danger {
            background-color: var(--error-color);
            color: white;
        }

        .flex-row { display: flex; align-items: center; gap: 8px; }
        .flex-space { justify-content: space-between; }
        .text-center { text-align: center; }

        /* === PFC Display === */
        .pfc-balance {
            display: flex;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            background-color: rgba(255,255,255,0.1);
            margin-bottom: 8px;
        }
        .pfc-bar { height: 100%; }
        .pfc-label-group {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .pfc-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }

        /* === List Items === */
        .list-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item:last-child { border-bottom: none; }
        
        /* === Navigation === */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--tab-bar-height);
            background-color: var(--surface-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-color);
            z-index: 1000;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            text-decoration: none;
            background: none;
            border: none;
            padding: 8px 0;
            cursor: pointer;
        }
        .nav-item i {
            font-size: 1.25rem;
            margin-bottom: 4px;
        }
        .nav-item.active {
            color: var(--primary-color);
        }

        /* === Additions for new features === */
        .date-navigator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--surface-color);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .add-set-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .add-set-row input { flex: 1; }

        .progress-circle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: 16px auto;
        }
        
        .progress-circle-bg {
            fill: none;
            stroke: var(--border-color);
            stroke-width: 10;
        }
        
        .progress-circle-bar {
            fill: none;
            stroke: var(--secondary-color);
            stroke-width: 10;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 0.3s ease;
        }
        
        .progress-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-primary);
            display: flex; flex-direction: column; align-items
