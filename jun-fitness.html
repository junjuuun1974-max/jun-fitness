function loadImageToDataURL(file,maxSide=1600,quality=0.82){
  return new Promise((resolve,reject)=>{
    if(!file){reject(new Error("file missing"));return;}
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let {width,height}=img;
        const scale=Math.min(1,maxSide/Math.max(width,height));
        const w=Math.max(1,Math.round(width*scale));
        const h=Math.max(1,Math.round(height*scale));
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.onerror=()=>reject(new Error("image load error"));
      img.src=reader.result;
    };
    reader.onerror=()=>reject(new Error("file read error"));
    reader.readAsDataURL(file);
  });
}

function getMealEntries(dayData,dayType,meal){
  const entries=((dayData.mealEntries||{})[meal.id]||[]).map(it=>({
    id:it.id||makeId("mi"),
    name:it.name||"",
    p:numOr0(it.p),
    c:numOr0(it.c),
    f:numOr0(it.f),

  return [makeDefaultMealEntry(meal)];
}
function calcMealTotals(entries){
  return (entries||[]).reduce((acc,it)=>{
    acc.p+=numOr0(it.p);acc.c+=numOr0(it.c);acc.f+=numOr0(it.f);acc.kcal+=calcKcalFromPFC(it.p,it.c,it.f);return acc;

}

  };
}
function makeBackupFileName(){
  const d=new Date();
  const p=(v)=>String(v).padStart(2,"0");
  return `${BACKUP_FILE_PREFIX}-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}.json`;
}
function downloadJsonFile(filename,payload){
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),500);
}

const getWeekKey=(dk)=>{const d=new Date(dk+"T00:00:00");const day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));return fmt(mon);};
const getMonthKey=(dk)=>dk.slice(0,7);
const calcDayVolume=(dayData)=>{if(!dayData||dayData.type!=="workout")return 0;let vol=0;Object.values(dayData.exLog||{}).forEach(log=>(log.sets||[]).forEach(s=>{vol+=(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0);}));return Math.round(vol);};

function Sparkline({data,color,width=290,height=60,goal}){
  if(!data||data.length<2)return null;
  const vals=data.map(d=>d.val);
  const allV=goal!==undefined?[...vals,goal]:vals;
  const minV=Math.min(...allV)*0.995,maxV=Math.max(...allV)*1.005,range=(maxV-minV)||1;
  const pts=data.map((d,i)=>[(i/(data.length-1))*(width-20)+10,height-((d.val-minV)/range)*(height-16)-8]);
  const goalY=goal!==undefined?height-((goal-minV)/range)*(height-16)-8:null;
  return(
    <svg width={width} height={height} style={{overflow:"visible",display:"block"}}>
      {goalY!==null&&<><line x1={10} y1={goalY} x2={width-10} y2={goalY} stroke="#6FB04A" strokeWidth={1} strokeDasharray="4,3" opacity={0.6}/><text x={width-8} y={goalY-3} fill="#6FB04A" fontSize={9} textAnchor="end" opacity={0.8}>目標</text></>}
      <polyline points={pts.map(p=>p.join(",")).join(" ")} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map(([x,y],i)=>i===pts.length-1?<circle key={i} cx={x} cy={y} r={4} fill={color} stroke="#F6F4EA" strokeWidth={1.5}/>:null)}
    </svg>
  );
}

// ── Bar Chart ─────────────────────────────────────────────
function BarChart({data,color,width=290,height=80}){
  if(!data||data.length===0)return <div style={{textAlign:"center",padding:16,color:"#8B9276",fontSize:11}}>データなし</div>;
  const maxV=Math.max(...data.map(d=>d.val),1);
  const barW=Math.floor((width-20)/data.length)-4;
  return(
    <svg width={width} height={height+24} style={{overflow:"visible",display:"block"}}>
      {data.map((d,i)=>{
        const x=10+i*((width-20)/data.length);
        const bh=Math.max(2,(d.val/maxV)*(height-10));
        const y=height-bh;
        const isLast=i===data.length-1;
        return(<g key={i}>
          <rect x={x} y={y} width={barW} height={bh} fill={isLast?color:`${color}55`} rx={3}/>
          {isLast&&<text x={x+barW/2} y={y-4} fill={color} fontSize={9} textAnchor="middle" fontWeight="700">{d.val>=1000?`${(d.val/1000).toFixed(1)}k`:d.val}</text>}
          <text x={x+barW/2} y={height+14} fill="#8B9276" fontSize={8} textAnchor="middle">{d.label}</text>
        </g>);
      })}
    </svg>
  );
}

function BackupPanel({data,goals,onImport}){
  const fileRef=useRef(null);
  const [message,setMessage]=useState("");

  const handleExport=()=>{
    try{
      const payload={app:"JUN FITNESS",format:"backup",version:"v1",exportedAt:new Date().toISOString(),payload:{data,goals}};
      downloadJsonFile(makeBackupFileName(),payload);
      setMessage("バックアップJSONを書き出しました");
    }catch(_){
      alert("バックアップの書き出しに失敗しました。");
    }
  };

  const handleImportFile=async(e)=>{
    const file=e.target.files&&e.target.files[0];
    e.target.value="";
    if(!file)return;
    try{
      const text=await file.text();
      const parsed=JSON.parse(text);
      if(!confirm("このバックアップで現在の記録を置き換えますか？\n※今の端末データは上書きされます。"))return;
      onImport(parsed);
      setMessage(`バックアップを復元しました (${file.name})`);
    }catch(_){
      alert("JSONバックアップの読み込みに失敗しました。ファイル内容をご確認ください。");
    }
  };

  return (
    <div style={{background:"rgba(255,255,255,.9)",borderRadius:22,padding:14,marginBottom:14,border:"1px solid #ECF3DE",boxShadow:"0 10px 22px rgba(113,132,63,.06)"}}>

        <button onClick={handleExport} style={{padding:"11px 0",borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#9BC64A 0%,#79B14A 100%)",color:"#fffdf5",fontSize:13,fontWeight:800,boxShadow:"0 8px 18px rgba(113,132,63,.16)"}}>⬇️ バックアップ保存</button>
        <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{padding:"11px 0",borderRadius:10,border:"1px solid rgba(121,177,74,.35)",cursor:"pointer",background:"#F2F7E5",color:"#5F8F3D",fontSize:13,fontWeight:800}}>⬆️ バックアップ読込</button>
      </div>
      <input ref={fileRef} type="file" accept="application/json,.json" onChange={handleImportFile} style={{display:"none"}}/>
      <div style={{fontSize:10,color:"#8B9276",marginTop:8,lineHeight:1.6}}>※ 写真も含めて保存されます。端末変更前やSafariデータ削除前の退避におすすめです。</div>

    </div>
  );
}

// ── SetLogger ─────────────────────────────────────────────
function SetLogger({sets,onChange,accent,defWeight,defReps}){
  const addSet=()=>onChange([...sets,{weight:defWeight||"",reps:defReps||""}]);
  const removeSet=(i)=>onChange(sets.filter((_,j)=>j!==i));
  const updSet=(i,f,v)=>{const n=[...sets];n[i]={...n[i],[f]:v};onChange(n);};
  const iStyle=(val,ac)=>({width:"100%",padding:"5px 4px",background:"#F6F4EA",border:`1px solid ${val?ac+"80":"#2a2e38"}`,borderRadius:6,color:val?ac:"#7F8D6D",fontSize:13,fontFamily:"monospace",fontWeight:val?700:400,textAlign:"center",boxSizing:"border-box",outline:"none"});
  return(
    <div>
      {sets.length>0&&<div style={{display:"grid",gridTemplateColumns:"18px 1fr 10px 1fr 20px",gap:4,alignItems:"center",marginBottom:4}}><div/><div style={{fontSize:9,color:"#8B9276",textAlign:"center",fontWeight:600}}>重量(kg)</div><div/><div style={{fontSize:9,color:"#8B9276",textAlign:"center",fontWeight:600}}>回数</div><div/></div>}
      {sets.map((s,i)=>(
        <div key={i} style={{display:"grid",gridTemplateColumns:"18px 1fr 10px 1fr 20px",gap:4,alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:10,color:"#8B9276",textAlign:"center",fontWeight:600}}>{i+1}</div>
          <input type="text" inputMode="decimal" pattern="[0-9.]*" autoComplete="off" autoCorrect="off" spellCheck="false" value={s.weight} onChange={e=>{const v=e.target.value;if(v===""||(/^\d*\.?\d*$/.test(v)&&v.length<=4))updSet(i,"weight",v);}} placeholder={defWeight||"kg"} style={iStyle(s.weight,accent)}/>
          <div style={{fontSize:10,color:"#8B9276",textAlign:"center"}}>×</div>
          <input type="text" inputMode="numeric" pattern="[0-9]*" autoComplete="off" autoCorrect="off" spellCheck="false" value={s.reps} onChange={e=>{const v=e.target.value;if(v===""||/^\d+$/.test(v))updSet(i,"reps",v);}} placeholder={defReps||"回"} style={iStyle(s.reps,"#344226")}/>
          <button onClick={()=>removeSet(i)} style={{background:"none",border:"none",color:"#8B9276",cursor:"pointer",fontSize:14,padding:0,lineHeight:1,textAlign:"center"}}>×</button>
        </div>
      ))}
      <div style={{display:"flex",gap:6,marginTop:4}}>
        <button onClick={addSet} style={{flex:1,padding:"5px 0",borderRadius:6,background:"rgba(255,255,255,0.03)",border:"1px dashed #2a2e38",color:"#6F7B5E",cursor:"pointer",fontSize:11}}>＋ セット</button>
        {sets.length===0&&<button onClick={()=>onChange(Array.from({length:5},()=>({weight:defWeight||"",reps:defReps||""})))} style={{flex:1,padding:"5px 0",borderRadius:6,background:"rgba(255,255,255,0.03)",border:"1px dashed #2a2e38",color:"#6F7B5E",cursor:"pointer",fontSize:11}}>5set一括</button>}
      </div>
    </div>
  );
}

// ── ExCard ────────────────────────────────────────────────
function ExCard({ex,log={},onChange,accent,badge,onRemove,isCustom,goalWeight}){
  const[open,setOpen]=useState(false);
  const sets=log.sets||[],done=log.done||false,note=log.note||"";
  const upd=(f,v)=>onChange({...log,[f]:v});
  const doneSets=sets.filter(s=>s.weight||s.reps).length;
  const maxW=sets.length>0?Math.max(...sets.map(s=>parseFloat(s.weight)||0)):0;
  const gwPct=goalWeight&&maxW>0?Math.min(100,(maxW/goalWeight)*100):0;
  return(
    <div style={{background:"#FFFFFF",borderRadius:10,marginBottom:7,border:`1px solid ${done?accent+"66":"#ECF3DE"}`,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"stretch",minHeight:48}}>
        <div onClick={e=>{e.stopPropagation();upd("done",!done);}} style={{width:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",borderRight:"1px solid #E5EAD8",flexShrink:0,background:done?`${accent}15`:"transparent"}}>
          <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${done?accent:"#8B9276"}`,background:done?accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{done&&<span style={{color:"#fff",fontSize:11,fontWeight:900,lineHeight:1}}>✓</span>}</div>
        </div>
        <div onClick={()=>setOpen(!open)} style={{flex:1,padding:"9px 10px",cursor:"pointer",minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:700,color:done?accent:"#344226"}}>{ex.name}</span>
            {badge&&<Chip color="#A6A66F">{badge}</Chip>}
            {isCustom&&<Chip color="#D9A441">カスタム</Chip>}
          </div>
          <div style={{fontSize:10,color:"#6F7B5E",marginTop:2,display:"flex",gap:8,flexWrap:"wrap"}}>
            {goalWeight&&<span style={{color:"#8B9276"}}>目標{goalWeight}kg</span>}
            {doneSets>0&&<span style={{color:accent,fontWeight:700}}>{doneSets}set{maxW>0?` · 最高${maxW}kg`:""}</span>}
            {goalWeight&&maxW>0&&<span style={{color:gwPct>=100?"#6FB04A":"#6F7B5E"}}>{Math.round(gwPct)}%</span>}
          </div>
          {goalWeight&&maxW>0&&<div style={{height:3,background:"#F2F7E5",borderRadius:2,marginTop:4}}><div style={{width:`${gwPct}%`,height:"100%",background:gwPct>=100?"#6FB04A":accent,borderRadius:2,transition:"width 0.4s"}}/></div>}
        </div>
        <div style={{display:"flex",alignItems:"center",flexShrink:0}}>
          {onRemove&&<button onClick={e=>{e.stopPropagation();onRemove();}} style={{background:"none",border:"none",color:"#8B9276",cursor:"pointer",fontSize:15,padding:"0 6px"}}>🗑</button>}
          <div onClick={()=>setOpen(!open)} style={{padding:"0 10px",cursor:"pointer",color:"#6F7B5E",fontSize:11,display:"flex",alignItems:"center"}}>{open?"▲":"▼"}</div>
        </div>
      </div>
      {open&&(
        <div style={{padding:"10px 12px",borderTop:"1px solid #E5EAD8"}}>
          {ex.note&&<div style={{fontSize:10,color:"#7F8D6D",marginBottom:8}}>⚠️ {ex.note}</div>}
          <SetLogger sets={sets} onChange={v=>upd("sets",v)} accent={accent} defWeight={ex.cur?String(ex.cur):""} defReps={ex.defReps?String(ex.defReps):""}/>
          <textarea value={note} onChange={e=>upd("note",e.target.value)} placeholder="メモ（フォーム・体感など）..." style={{width:"100%",minHeight:44,marginTop:8,background:"#F6F4EA",border:"1px solid #ECF3DE",borderRadius:7,color:"#7F8D6D",fontSize:11,padding:8,resize:"vertical",boxSizing:"border-box"}}/>
        </div>
      )}
    </div>
  );
}

// ── MealCard / MealPanel ──────────────────────────────────

          {meal.supps.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:10,color:"#6F7B5E",marginBottom:5}}>💊 サプリ・薬</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{meal.supps.map(s=><Chip key={s}>{s}</Chip>)}</div></div>}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,marginTop:8}}>

          </div>
          {(entries||[]).map((item,idx)=><MealItemRow key={item.id||idx} item={item} mealId={meal.id} onChange={next=>updateItem(idx,next)} onDelete={()=>deleteItem(idx)}/>)}

          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:8,marginBottom:8}}>
            {[{label:"P",val:`${Math.round(totals.p)}g`,color:"#F39A2D"},{label:"C",val:`${Math.round(totals.c)}g`,color:"#6FAACF"},{label:"F",val:`${Math.round(totals.f)}g`,color:"#6FB04A"},{label:"kcal",val:Math.round(totals.kcal),color:"#A6A66F"}].map(m=>(<div key={m.label} style={{background:"#F6F4EA",borderRadius:8,padding:"9px 4px",textAlign:"center",border:"1px solid #ECF3DE"}}><div style={{fontSize:9,color:"#6F7B5E",marginBottom:4}}>{m.label}</div><div style={{fontSize:14,fontWeight:900,color:m.color,fontFamily:"monospace"}}>{m.val}</div></div>))}
          </div>

          {editNote?(<div style={{marginTop:8}}><textarea value={val} onChange={e=>setVal(e.target.value)} placeholder="実際の摂取・メモ..." style={{width:"100%",minHeight:60,background:"#F6F4EA",border:"1px solid #8B9276",borderRadius:7,color:"#344226",fontSize:13,padding:10,resize:"vertical",boxSizing:"border-box"}}/><div style={{display:"flex",gap:8,marginTop:8}}><button onClick={()=>{onNote(val);setEditNote(false);}} style={{flex:1,padding:"9px 0",borderRadius:7,background:accent,border:"none",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>保存</button><button onClick={()=>setEditNote(false)} style={{flex:1,padding:"9px 0",borderRadius:7,background:"#F2F7E5",border:"none",color:"#7F8D6D",cursor:"pointer",fontSize:13}}>キャンセル</button></div></div>):(<button onClick={()=>setEditNote(true)} style={{width:"100%",padding:"8px 0",borderRadius:7,background:"rgba(255,255,255,0.04)",border:"1px solid #ECF3DE",color:"#7F8D6D",cursor:"pointer",fontSize:12,marginTop:4}}>{note?`📝 ${note.substring(0,50)}${note.length>50?"...":""}`:"+  メモを追加"}</button>)}
        </div>
      )}
    </div>
  );
}

  const checks=dayData.mealChecks||{},notes=dayData.mealNotes||{},mealEntries=dayData.mealEntries||{};
  const dayTotals=calcDayNutrition(dayData,dayType);
  const done=meals.filter(m=>checks[m.id]).length;
  const saveEntries=(mealId,entries)=>updateDay({mealEntries:{...mealEntries,[mealId]:entries}});
  return(
    <div style={{paddingBottom:16}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>

      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
        <span style={{fontSize:11,color:"#6F7B5E",flexShrink:0}}>完了 {done}/{meals.length}</span>
        <BarLine value={done} max={meals.length} color={accent}/>
        {done===meals.length&&<span style={{fontSize:11,color:"#6FB04A",flexShrink:0}}>✓</span>}
      </div>
      <div style={{fontSize:10,color:"#6F7B5E",marginBottom:12}}>管理メニューから選ぶと、PFCとkcalが自動入力されます。必要に応じて数値は微調整できます。</div>
      <div style={{background:"#FFFFFF",borderRadius:10,padding:12,marginBottom:12,border:"1px solid #ECF3DE"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#7F8D6D",marginBottom:8}}>よく使う食材の候補</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,rowGap:8}}>
          {Object.entries(recommendFoodGroups).map(([group,items])=>(<div key={group} style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}><span style={{fontSize:10,color:"#6F7B5E"}}>{group}</span>{items.slice(0,4).map(it=><Chip key={it.id} color={group==="高たんぱく"?"#F39A2D":group==="炭水化物"?"#6FAACF":"#6FB04A"}>{it.name}</Chip>)}</div>))}
        </div>
      </div>
      {meals.map(m=><MealCard key={m.id} meal={m} entries={getMealEntries(dayData,dayType,m)} checked={!!checks[m.id]} onCheck={v=>updateDay({mealChecks:{...checks,[m.id]:v}})} onEntriesChange={v=>saveEntries(m.id,v)} note={notes[m.id]} onNote={v=>updateDay({mealNotes:{...notes,[m.id]:v}})} accent={accent}/>)}
    </div>
  );
}

// ── PhotoPanel ───────────────────────────────────────────────
function PhotoPanel({selDate,dayData,updateDay,accent}){
  const photos=dayData.photos||[];
  const [uploading,setUploading]=useState(false);
  const [activeType,setActiveType]=useState("front");
  const [draftNote,setDraftNote]=useState("");
  const [cameraOpen,setCameraOpen]=useState(false);
  const [countdown,setCountdown]=useState(10);
  const [cameraError,setCameraError]=useState("");
  const cameraTimerRef=useRef(null);
  const libraryInputRef=useRef(null);
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);

  const savePhotos=(next)=>updateDay({photos:next});

  const stopCamera=useCallback(()=>{
    if(cameraTimerRef.current){clearInterval(cameraTimerRef.current);cameraTimerRef.current=null;}
    if(streamRef.current){
      streamRef.current.getTracks().forEach(track=>track.stop());
      streamRef.current=null;
    }
  },[]);

  useEffect(()=>()=>stopCamera(),[stopCamera]);

  const addFiles=async(files)=>{
    const list=Array.from(files||[]).filter(f=>f&&f.type&&f.type.startsWith("image/"));
    if(list.length===0)return;
    setUploading(true);
    try{
      const made=[];
      for(const file of list.slice(0,5)){
        const src=await loadImageToDataURL(file);
        made.push({
          id:`p_${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
          type:activeType,
          note:draftNote,
          src,
          createdAt:new Date().toISOString(),
          name:file.name||"photo.jpg",
        });
      }
      savePhotos([...(photos||[]),...made]);
      setDraftNote("");
      if(libraryInputRef.current)libraryInputRef.current.value="";
    }catch(err){
      alert("写真の保存に失敗しました");
    }finally{
      setUploading(false);
    }
  };

  const captureFrame=useCallback(()=>{
    const video=videoRef.current;
    const canvas=canvasRef.current;
    if(!video||!canvas)return;
    const vw=video.videoWidth||1080;
    const vh=video.videoHeight||1440;
    canvas.width=vw;
    canvas.height=vh;
    const ctx=canvas.getContext("2d");
    ctx.drawImage(video,0,0,vw,vh);
    const src=canvas.toDataURL("image/jpeg",0.9);
    savePhotos([...(photos||[]),{
      id:`p_${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
      type:activeType,
      note:draftNote,
      src,
      createdAt:new Date().toISOString(),
      name:`camera_${selDate}.jpg`,
    }]);
    setDraftNote("");
    stopCamera();
    setCameraOpen(false);
    setCountdown(10);
  },[photos,activeType,draftNote,selDate,stopCamera]);

  const startTimedCamera=async()=>{
    setCameraError("");
    setCameraOpen(true);
    setCountdown(10);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:"user"},width:{ideal:1080},height:{ideal:1440}},
        audio:false
      });
      streamRef.current=stream;
      if(videoRef.current){
        videoRef.current.srcObject=stream;
        await videoRef.current.play().catch(()=>{});
      }
      cameraTimerRef.current=setInterval(()=>{
        setCountdown(prev=>{
          if(prev<=1){
            clearInterval(cameraTimerRef.current);
            cameraTimerRef.current=null;
            setTimeout(()=>captureFrame(),100);
            return 0;
          }
          return prev-1;
        });
      },1000);
    }catch(err){
      setCameraError("カメラを起動できませんでした。ライブラリから追加をご利用ください。");
      stopCamera();
    }
  };

  const closeCameraModal=()=>{
    stopCamera();
    setCameraOpen(false);
    setCountdown(10);
  };

  const deletePhoto=(id)=>savePhotos(photos.filter(p=>p.id!==id));
  const updatePhoto=(id,patch)=>savePhotos(photos.map(p=>p.id===id?{...p,...patch}:p));
  const typeCounts=PHOTO_TYPES.reduce((acc,t)=>{acc[t.id]=photos.filter(p=>p.type===t.id).length;return acc;},{});

  return(
    <div style={{paddingBottom:16}}>
      <div style={{background:"rgba(255,255,255,.88)",borderRadius:22,padding:14,marginBottom:14,border:"1px solid #ECF3DE"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#7F8D6D",marginBottom:10,textAlign:"center"}}>📸 写真記録</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
          {PHOTO_TYPES.map(t=>(
            <button key={t.id} onClick={()=>setActiveType(t.id)} style={{padding:"8px 4px",borderRadius:8,background:activeType===t.id?`${accent}16`:"#F6F4EA",border:`1px solid ${activeType===t.id?accent:"#ECF3DE"}`,color:activeType===t.id?accent:"#7F8D6D",fontSize:11,fontWeight:700,cursor:"pointer"}}>
              <div style={{fontSize:16,marginBottom:4}}>{t.icon}</div>
              <div>{t.label}</div>
              <div style={{fontSize:9,color:"#6F7B5E",marginTop:2}}>{typeCounts[t.id]||0}枚</div>
            </button>
          ))}
        </div>

        <textarea
          value={draftNote}
          onChange={e=>setDraftNote(e.target.value)}
          placeholder="メモ（体の変化、角度、時間帯など）"
          style={{width:"100%",minHeight:52,background:"#F6F4EA",border:"1px solid #ECF3DE",borderRadius:8,color:"#556345",fontSize:12,padding:10,resize:"vertical",boxSizing:"border-box",marginBottom:10}}
        />

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <button onClick={startTimedCamera} disabled={uploading||cameraOpen} style={{padding:"10px 0",borderRadius:8,background:accent,border:"none",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer",opacity:(uploading||cameraOpen)?0.7:1}}>
            {cameraOpen?`⏱ ${countdown}秒`:"📷 10秒タイマー撮影"}
          </button>
          <button onClick={()=>libraryInputRef.current&&libraryInputRef.current.click()} disabled={uploading||cameraOpen} style={{padding:"10px 0",borderRadius:8,background:"#F2F7E5",border:"1px solid #334155",color:"#344226",fontSize:13,fontWeight:700,cursor:"pointer",opacity:(uploading||cameraOpen)?0.7:1}}>
            {uploading?"保存中...":"🖼️ ライブラリから追加"}
          </button>
        </div>
        <input
          ref={libraryInputRef}
          type="file"
          accept="image/*"
          multiple
          onChange={e=>addFiles(e.target.files)}
          style={{display:"none"}}
        />
        <canvas ref={canvasRef} style={{display:"none"}} />
        <div style={{fontSize:10,color:"#6F7B5E",lineHeight:1.6}}>
          選択中の分類: <span style={{color:accent,fontWeight:700}}>{PHOTO_TYPES.find(t=>t.id===activeType)?.label}</span> / タイマーボタンを押すとカメラが起動し、10秒後に自動撮影します
        </div>
      </div>

      {cameraOpen&&ReactDOM.createPortal(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,width:"100vw",height:"100dvh",zIndex:99999,background:"rgba(0,0,0,0.96)",display:"flex",flexDirection:"column",paddingTop:"max(12px, env(safe-area-inset-top))",paddingRight:"max(12px, env(safe-area-inset-right))",paddingBottom:"max(12px, env(safe-area-inset-bottom))",paddingLeft:"max(12px, env(safe-area-inset-left))",boxSizing:"border-box",overflow:"hidden"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,padding:"4px 2px 12px",flexShrink:0}}>
            <div>
              <div style={{fontSize:14,fontWeight:800,color:"#344226"}}>📷 10秒タイマー撮影</div>
              <div style={{fontSize:11,color:"#7F8D6D",marginTop:2}}>姿勢を整えて、そのまま待てば自動で保存します</div>
            </div>
            <button onClick={closeCameraModal} style={{padding:"8px 12px",borderRadius:10,background:"#F2F7E5",border:"1px solid #8B9276",color:"#556345",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>閉じる</button>
          </div>

          <div style={{position:"relative",flex:1,minHeight:0,background:"#000",borderRadius:18,overflow:"hidden",border:"1px solid #ECF3DE",boxShadow:"0 18px 50px rgba(0,0,0,0.4)"}}>
            <video ref={videoRef} playsInline muted autoPlay style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block",background:"#000"}} />

            <div style={{position:"absolute",top:14,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,0.52)",padding:"8px 14px",borderRadius:999,color:"#fff",fontSize:13,fontWeight:800,border:"1px solid rgba(255,255,255,0.16)",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>
              自動撮影まで {countdown}秒
            </div>

            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none",padding:"0 20px"}}>
              <div style={{width:"min(46vw, 180px)",height:"min(46vw, 180px)",minWidth:120,minHeight:120,maxWidth:180,maxHeight:180,borderRadius:"50%",background:"rgba(0,0,0,0.34)",backdropFilter:"blur(3px)",WebkitBackdropFilter:"blur(3px)",border:"2px solid rgba(255,255,255,0.25)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 12px 36px rgba(0,0,0,0.38)"}}>
                <div style={{fontSize:"clamp(64px, 16vw, 96px)",lineHeight:1,fontWeight:900,color:"#FFFFFF",textShadow:"0 6px 24px rgba(0,0,0,0.55)",fontVariantNumeric:"tabular-nums"}}>
                  {countdown>0?countdown:"📸"}
                </div>
              </div>
            </div>

            <div style={{position:"absolute",bottom:16,left:"50%",transform:"translateX(-50%)",maxWidth:"calc(100% - 32px)",background:"rgba(0,0,0,0.5)",padding:"8px 14px",borderRadius:999,color:"#344226",fontSize:12,fontWeight:800,border:"1px solid rgba(255,255,255,0.14)",letterSpacing:"0.04em",whiteSpace:"nowrap",textOverflow:"ellipsis",overflow:"hidden",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)",fontVariantNumeric:"tabular-nums"}}>
              {countdown>0?`${countdown} → ${Math.max(countdown-1,0)} → 撮影`:"撮影中..."}
            </div>
          </div>

          {cameraError
            ? <div style={{fontSize:12,color:"#FCA5A5",marginTop:12,lineHeight:1.6,flexShrink:0}}>{cameraError}</div>
            : <div style={{fontSize:12,color:"#7F8D6D",marginTop:12,lineHeight:1.6,flexShrink:0}}>10秒後に自動保存します。顔だけでなく、上半身または全身が入る距離に調整してください。</div>}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:12,flexShrink:0}}>
            <button onClick={()=>{closeCameraModal();setTimeout(startTimedCamera,180);}} style={{padding:"12px 0",borderRadius:12,background:"rgba(96,165,250,0.12)",border:"1px solid rgba(96,165,250,0.35)",color:"#6FAACF",fontSize:14,fontWeight:800,cursor:"pointer"}}>やり直す</button>
            <button onClick={captureFrame} style={{padding:"12px 0",borderRadius:12,background:"rgba(52,211,153,0.16)",border:"1px solid rgba(52,211,153,0.35)",color:"#6EE7B7",fontSize:14,fontWeight:800,cursor:"pointer"}}>今すぐ撮影</button>
          </div>
        </div>,
        document.body
      )}

      <div style={{background:"rgba(255,255,255,.88)",borderRadius:22,padding:14,border:"1px solid #ECF3DE"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#7F8D6D"}}>この日の保存写真</div>
          <div style={{fontSize:10,color:"#6F7B5E"}}>{photos.length}枚</div>
        </div>
        {photos.length===0?(
          <div style={{textAlign:"center",padding:"18px 0",fontSize:11,color:"#8B9276"}}>まだ写真はありません</div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
            {photos.slice().reverse().map(photo=>{
              const tp=PHOTO_TYPES.find(t=>t.id===photo.type)||PHOTO_TYPES[3];
              return(
                <div key={photo.id} style={{background:"#F6F4EA",border:"1px solid #ECF3DE",borderRadius:10,overflow:"hidden"}}>
                  <div style={{position:"relative",aspectRatio:"3 / 4",background:"#94BE45"}}>
                    <img src={photo.src} alt={`${tp.label}写真`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                    <div style={{position:"absolute",top:8,left:8,background:"rgba(13,15,20,0.8)",border:`1px solid ${accent}66`,color:"#344226",padding:"3px 7px",borderRadius:999,fontSize:10,fontWeight:700}}>
                      {tp.icon} {tp.label}
                    </div>
                    <button onClick={()=>deletePhoto(photo.id)} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.55)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",borderRadius:999,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>削除</button>
                  </div>
                  <div style={{padding:10}}>
                    <div style={{fontSize:10,color:"#6F7B5E",marginBottom:6}}>{selDate.replaceAll("-","/")}</div>
                    <textarea
                      value={photo.note||""}
                      onChange={e=>updatePhoto(photo.id,{note:e.target.value})}
                      placeholder="この写真のメモ"
                      style={{width:"100%",minHeight:46,background:"#94BE45",border:"1px solid #ECF3DE",borderRadius:7,color:"#556345",fontSize:11,padding:8,resize:"vertical",boxSizing:"border-box"}}
                    />
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const[month,setMonth]=useState(new Date());
  const[selDate,setSelDate]=useState(today);
  const[data,setData]=useState({});
  const[goals,setGoals]=useState(DEFAULT_GOALS);
  const[tab,setTab]=useState("cal");
  const[panel,setPanel]=useState("meal");
  const[ready,setReady]=useState(false);

  useEffect(()=>{
    const saved=lsLoad();
    if(saved){setData(saved.data||{});setGoals({...DEFAULT_GOALS,...(saved.goals||{})});}
    setReady(true);
  },[]);

  const save=(nd,ng)=>{setData(nd);setGoals(ng);lsSave({data:nd,goals:ng});};
  const updateDay=(dk,patch)=>save({...data,[dk]:{...(data[dk]||{}),...patch}},goals);
  const updateGoals=(g)=>save(data,g);
  const restoreFromBackup=(raw)=>{
    const normalized=normalizeBackupPayload(raw);
    save(normalized.data,normalized.goals);
    const keys=Object.keys(normalized.data||{}).sort();
    setSelDate(keys[keys.length-1]||today);
    setTab("progress");
  };
  const updateSel=(patch)=>updateDay(selDate,patch);

  const selData=data[selDate]||{};
  const dayType=selData.type||"rest";
  const accent=DAY_TYPES[dayType].color;
  const yr=month.getFullYear(),mo=month.getMonth();
  const dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();
  const selObj=new Date(selDate+"T00:00:00");
  const CELL=34;
  const selNutrition=calcDayNutrition(selData,dayType);

  if(!ready)return(<div style={{background:"linear-gradient(180deg,#F2F3E8 0%,#FAF7EF 100%)",height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",color:"#6F7B5E",fontWeight:700}}>読み込み中...</div>);

  return(
    <div style={{background:"linear-gradient(180deg,#F2F3E8 0%,#F8F6ED 42%,#FBF8F1 100%)",height:"100dvh",display:"flex",flexDirection:"column",overflow:"hidden",fontFamily:"'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif",color:"#344226"}}>

      {/* Header */}
      <div style={{flexShrink:0,background:"linear-gradient(180deg,#9CC64A 0%,#86B74A 100%)",borderBottom:`2px solid ${tab==="progress"?"#A6A66F":accent}55`,boxShadow:"0 10px 28px rgba(119,151,56,.18)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px 8px",borderBottom:"1px solid rgba(255,255,255,.18)"}}>
          <div style={{fontSize:15,fontWeight:900,color:"#FFF9ED",letterSpacing:.4,textShadow:"0 1px 1px rgba(0,0,0,.08)"}}>🌿 JUN FITNESS</div>
          <div style={{display:"flex",gap:0,background:"rgba(255,255,255,.18)",borderRadius:999,padding:3,backdropFilter:"blur(8px)"}}>
            <button onClick={()=>setTab("cal")} style={{padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:tab==="cal"?700:400,background:tab==="cal"?"rgba(255,255,255,.9)":"transparent",color:tab==="cal"?"#5F8F3D":"rgba(255,255,255,.8)"}}>📅 カレンダー</button>
            <button onClick={()=>setTab("progress")} style={{padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:tab==="progress"?700:400,background:tab==="progress"?"rgba(255,255,255,.9)":"transparent",color:tab==="progress"?"#5F8F3D":"rgba(255,255,255,.8)"}}>📊 進捗</button>
          </div>
        </div>
        {tab==="cal"&&(<>
          <div style={{display:"flex",alignItems:"center",padding:"6px 14px 2px",color:"#FFF9ED"}}>
            <button onClick={()=>setMonth(new Date(yr,mo-1,1))} style={{background:"none",border:"none",color:"#FFF9ED",cursor:"pointer",fontSize:20,fontWeight:700,padding:"0 8px 0 0"}}>‹</button>
            <div style={{flex:1,textAlign:"center",fontWeight:800,fontSize:13,color:"#FFF9ED",letterSpacing:.3}}>{yr}年 {MONTH_JP[mo]}</div>
            <button onClick={()=>setMonth(new Date(yr,mo+1,1))} style={{background:"none",border:"none",color:"#FFF9ED",cursor:"pointer",fontSize:20,fontWeight:700,padding:"0 0 0 8px"}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:`repeat(7,${CELL}px)`,justifyContent:"center"}}>
            {DAY_JP.map((d,i)=>(<div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,width:CELL,paddingBottom:3,color:"rgba(255,249,237,.94)"}}>{d}</div>))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:`repeat(7,${CELL}px)`,justifyContent:"center",paddingBottom:10}}>
            {Array.from({length:fd}).map((_,i)=><div key={`e${i}`} style={{width:CELL,height:CELL}}/>)}
            {Array.from({length:dim}).map((_,i)=>{
              const day=i+1;
              const dk=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const dt=(data[dk]||{}).type,col=dt?DAY_TYPES[dt].color:null;
              const isT=dk===today,isS=dk===selDate;
              const hasBody=!!(data[dk]?.body?.weight);
              const hasPhoto=!!((data[dk]?.photos||[]).length);
              return(<div key={day} onClick={()=>setSelDate(dk)} style={{width:CELL,height:CELL,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",borderRadius:6,background:isS?"rgba(255,255,255,.22)":"transparent",border:isT?`2px solid #FFF9ED`:isS?`2px solid rgba(255,255,255,.85)`:"2px solid transparent",boxShadow:isS?"0 6px 16px rgba(72,104,27,.14)":"none"}}>
                <div style={{fontSize:11,fontWeight:isT?900:400,color:"#FFF9ED",lineHeight:1}}>{day}</div>
                <div style={{display:"flex",gap:2,marginTop:1}}>{dt&&<div style={{width:4,height:4,borderRadius:"50%",background:col}}/>}{hasBody&&<div style={{width:4,height:4,borderRadius:"50%",background:"#A6A66F"}}/>}</div>
              </div>);
            })}
          </div>
        </>)}
      </div>

      {/* Content */}
      {tab==="progress"?(
        <div style={{flex:1,overflowY:"auto",padding:"14px 14px calc(18px + env(safe-area-inset-bottom))",WebkitOverflowScrolling:"touch"}}>
          <ProgressPage data={data} goals={goals} updateGoals={updateGoals} onImportBackup={restoreFromBackup}/>
        </div>
      ):(
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{background:"rgba(255,255,255,.58)",padding:"10px 14px",display:"flex",alignItems:"center",gap:6,flexShrink:0,borderBottom:"1px solid #E5EAD8",backdropFilter:"blur(6px)"}}>
            <div>
              <span style={{fontSize:13,fontWeight:800}}>{selObj.getMonth()+1}月{selObj.getDate()}日</span>
              <span style={{fontSize:10,color:"#7F8D6D",marginLeft:5}}>({DAY_JP[selObj.getDay()]}){selDate===today?" · 今日":""}</span>
            </div>
            <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
              {Object.entries(DAY_TYPES).map(([k,v])=>(<button key={k} onClick={()=>updateSel({type:k})} style={{padding:"3px 7px",borderRadius:5,fontSize:10,cursor:"pointer",border:`1px solid ${dayType===k?v.color:"#ECF3DE"}`,background:dayType===k?"#ECF3DE":"rgba(255,255,255,.7)",color:dayType===k?"#5F8F3D":"#6F7B5E",fontWeight:dayType===k?700:400}}>{v.icon} {v.label}</button>))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",background:"rgba(255,255,255,.7)",borderBottom:"1px solid #E5EAD8",flexShrink:0,backdropFilter:"blur(6px)"}}>
            {[{id:"meal",label:"食事",icon:"🍽"},{id:"training",label:"トレーニング",icon:"🏋️"},{id:"body",label:"体組成",icon:"📊"},{id:"photo",label:"写真",icon:"📸"}].map(t=>(<button key={t.id} onClick={()=>setPanel(t.id)} style={{padding:"8px 0",background:"none",border:"none",cursor:"pointer",borderBottom:panel===t.id?`2px solid ${accent}`:"2px solid transparent",color:panel===t.id?"#5F8F3D":"#6F7B5E",fontWeight:panel===t.id?700:400,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><span>{t.icon}</span><span>{t.label}</span></button>))}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"14px 14px calc(18px + env(safe-area-inset-bottom))",WebkitOverflowScrolling:"touch"}}><DailyHeroCard dayType={dayType} nutrition={selNutrition}/>
            {panel==="meal"     &&<MealPanel     dayType={dayType} dayData={selData} updateDay={updateSel} accent={accent}/>}
            {panel==="training" &&<TrainingPanel dayType={dayType} dayData={selData} updateDay={updateSel} accent={accent} goals={goals}/>}
            {panel==="body"     &&<BodyPanel     selDate={selDate} allData={data}    updateDay={updateSel} accent={accent}/>}
            {panel==="photo"    &&<PhotoPanel    selDate={selDate} dayData={selData}  updateDay={updateSel} accent={accent}/>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
